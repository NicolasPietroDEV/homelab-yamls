apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      containers:
      - name: agent
        image: nousresearch/hermes-agent:latest
        command: ["gateway", "run"]
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: GOOGLE_API_KEY
        - name: API_SERVER_ENABLED
          value: "true"
        - name: API_SERVER_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: API_SERVER_KEY
        - name: API_SERVER_HOST
          value: "0.0.0.0" # Necessário para o Kubernetes Service funcionar
        - name: API_SERVER_PORT
          value: "8642"
        - name: HERMES_MODEL
          value: "google/gemini-2.0-flash" # Ou a versão desejada
        ports:
        - containerPort: 8642
        resources:
          limits:
            memory: "4Gi"
            cpu: "2"
          requests:
            memory: "2Gi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /opt/data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: hermes-data
