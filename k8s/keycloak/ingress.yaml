apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - host: keycloak.arpa
      http:
        paths:
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 9000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 9000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
