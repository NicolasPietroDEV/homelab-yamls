apiVersion: v1
kind: Service
metadata:
  name: syncthing-web
  namespace: syncthing
spec:
  selector:
    app: syncthing
  ports:
  - port: 8384
    targetPort: 8384
    name: web-ui
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: syncthing-sync
  namespace: syncthing
spec:
  selector:
    app: syncthing
  ports:
  - port: 22000
    targetPort: 22000
    name: sync-tcp
    protocol: TCP
  - port: 22000
    targetPort: 22000
    name: sync-udp
    protocol: UDP
  - port: 21027
    targetPort: 21027
    name: discovery
    protocol: UDP
  type: LoadBalancer
